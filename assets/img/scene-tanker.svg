<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-t" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0A0630"/>
      <stop offset="0.5" stop-color="#130C42"/>
      <stop offset="1" stop-color="#412ECE"/>
    </linearGradient>
    <linearGradient id="sea-t" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0A0630"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="sun-t" cx=".75" cy=".22" r=".14">
      <stop offset="0" stop-color="#D9F323" stop-opacity=".9"/>
      <stop offset="1" stop-color="#D9F323" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#sky-t)"/>
  <rect width="800" height="1000" fill="url(#sun-t)"/>
  <!-- Horizon line -->
  <line x1="0" y1="620" x2="800" y2="620" stroke="#D9F323" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Distant ships -->
  <g opacity="0.35" fill="#D9F323">
    <rect x="80" y="608" width="40" height="6"/>
    <rect x="82" y="604" width="6" height="6"/>
    <rect x="560" y="612" width="26" height="4"/>
  </g>
  <!-- Main tanker silhouette -->
  <g fill="#0A0630" stroke="#D9F323" stroke-width="1.2">
    <path d="M120 660 L680 660 L660 700 L140 700 Z"/>
    <rect x="260" y="600" width="180" height="60"/>
    <rect x="300" y="560" width="60" height="40"/>
    <rect x="380" y="540" width="28" height="60"/>
    <rect x="200" y="620" width="24" height="40"/>
    <rect x="480" y="620" width="24" height="40"/>
    <rect x="550" y="620" width="24" height="40"/>
  </g>
  <!-- Tanker deck lights -->
  <g fill="#D9F323">
    <circle cx="300" cy="615" r="2"/>
    <circle cx="340" cy="615" r="2"/>
    <circle cx="380" cy="615" r="2"/>
    <circle cx="420" cy="615" r="2"/>
  </g>
  <!-- Sea -->
  <rect y="700" width="800" height="300" fill="url(#sea-t)"/>
  <!-- Reflection -->
  <g opacity="0.18">
    <rect x="340" y="720" width="120" height="2" fill="#D9F323"/>
    <rect x="320" y="740" width="160" height="1.5" fill="#D9F323"/>
    <rect x="360" y="760" width="80" height="1" fill="#D9F323"/>
  </g>
  <!-- Wave suggestions -->
  <path d="M0 820 Q200 800 400 820 T800 820" stroke="#412ECE" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M0 880 Q200 860 400 880 T800 880" stroke="#412ECE" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Brand sigma watermark -->
  <text x="680" y="960" font-family="Oswald, sans-serif" font-weight="700" font-size="40" fill="#D9F323" opacity="0.4">σ</text>
</svg>
